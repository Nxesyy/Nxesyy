        <circle cx="625.5" cy="518.5" r="1.1" fill="#F472B6"/>
      </g>
      <g filter="url(#glow)">
        <circle cx="668" cy="524" r="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
        <circle cx="668" cy="524" r="9" fill="none" stroke="#34D399" stroke-width="1.6"/>
        <ellipse cx="668" cy="524" rx="4" ry="9" fill="none" stroke="#34D399" stroke-width="1.2"/>
        <line x1="659" y1="524" x2="677" y2="524" stroke="#34D399" stroke-width="1.2"/>
